# Paste this into TrueNAS SCALE: Apps → Discover Apps → Custom App.
# Adjust paths if your dataset is not /mnt/ssd/apps/anamnesis.
#
# Before deploying, on the server:
#   sudo zfs create -p ssd/apps/anamnesis
#   sudo mkdir -p /mnt/ssd/apps/anamnesis/{data,uploads,config}
#   sudo chown -R 568:568 /mnt/ssd/apps/anamnesis    # apps group on TrueNAS
#   sudo install -m 600 -o 568 -g 568 anamnesis.env /mnt/ssd/apps/anamnesis/config/anamnesis.env

services:
  backend:
    image: ghcr.io/nw89pu/anamnesis-backend:latest
    restart: unless-stopped
    user: "568:568"
    environment:
      NODE_ENV: production
      PORT: "3010"
      DATABASE_URL: /data/anamnesis.db
      UPLOAD_DIR: /uploads
    env_file:
      - /mnt/ssd/apps/anamnesis/config/anamnesis.env
    volumes:
      - /mnt/ssd/apps/anamnesis/data:/data
      - /mnt/ssd/apps/anamnesis/uploads:/uploads
    ports:
      - "10.0.1.10:3013:3010"
    networks:
      - anamnesis

  frontend:
    image: ghcr.io/nw89pu/anamnesis-frontend:latest
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "10.0.1.10:8090:80"
    networks:
      - anamnesis

  # MCP server — exposes Anamnesis tools to Claude via Streamable HTTP.
  # Internal-only: runner sibling connects to it через http://mcp:7800.
  # (External port mapping убран — runner живёт в той же docker-сети.)
  mcp:
    image: ghcr.io/nw89pu/anamnesis-mcp:latest
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    environment:
      NODE_ENV: production
      MCP_PORT: "7800"
      MCP_HOST: "0.0.0.0"
      ANAMNESIS_URL: http://backend:3010
    env_file:
      - /mnt/ssd/apps/anamnesis/config/anamnesis.env
    networks:
      - anamnesis

  # Claude Runner — spawns claude -p with MCP config per request.
  # Backend дёргает по http://runner:7900 (internal docker DNS), наружу
  # не торчит. OAuth credentials (MAX subscription) persistуются в
  # /mnt/ssd/apps/anamnesis/runner-claude volume.
  #
  # First-time setup после первого старта:
  #   sudo mkdir -p /mnt/ssd/apps/anamnesis/runner-claude
  #   sudo chown 568:568 /mnt/ssd/apps/anamnesis/runner-claude
  #   docker exec -it ix-anamnesis-runner-1 claude login
  #   (открыть URL → авторизовать в браузере → tokens сохранятся в volume)
  runner:
    image: ghcr.io/nw89pu/anamnesis-runner:latest
    restart: unless-stopped
    user: "568:568"
    depends_on:
      mcp:
        condition: service_started
    environment:
      MCP_SERVER_URL: http://mcp:7800/mcp
    env_file:
      - /mnt/ssd/apps/anamnesis/config/anamnesis.env   # RUNNER_TOKEN, MCP_TOKEN
    volumes:
      - /mnt/ssd/apps/anamnesis/runner-claude:/home/runner/.claude
    networks:
      - anamnesis

networks:
  anamnesis:
    driver: bridge
