# Frontend container: serves the React PWA and proxies API/uploads to the backend.
# The outer reverse proxy (Nginx Proxy Manager) only needs to point to this single service.

upstream anamnesis_backend {
    server backend:3010;
}

server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 100M;

    # Service worker — must never be cached by browser
    location = /sw.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files $uri =404;
    }

    # PWA manifest — short cache only
    location = /manifest.json {
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    # API → backend
    location ^~ /api/ {
        proxy_pass http://anamnesis_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # Uploaded documents → backend (it streams the file)
    location ^~ /uploads/ {
        proxy_pass http://anamnesis_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        add_header X-Download-Options noopen always;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
